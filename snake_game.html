<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE //</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #020408;
    --grid: #0a1628;
    --neon-green: #00ff88;
    --neon-cyan: #00e5ff;
    --neon-pink: #ff0066;
    --neon-yellow: #ffee00;
    --snake-head: #00ff88;
    --snake-body: #00cc6a;
    --food: #ff0066;
    --glow-green: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00ff8855;
    --glow-pink: 0 0 10px #ff0066, 0 0 20px #ff0066, 0 0 40px #ff006655;
    --glow-cyan: 0 0 10px #00e5ff, 0 0 20px #00e5ff, 0 0 40px #00e5ff55;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--neon-green);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.02) 2px, rgba(0,255,136,0.02) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,255,136,0.02) 2px, rgba(0,255,136,0.02) 4px);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  header {
    text-align: center;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 0.2em;
    color: var(--neon-green);
    text-shadow: var(--glow-green);
    animation: flicker 4s infinite;
  }

  .subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    margin-top: 4px;
    opacity: 0.8;
  }

  .hud {
    display: flex;
    gap: 40px;
    align-items: center;
  }

  .hud-item {
    text-align: center;
  }

  .hud-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--neon-cyan);
    opacity: 0.7;
  }

  .hud-value {
    font-family: 'Orbitron', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--neon-green);
    text-shadow: var(--glow-green);
    transition: transform 0.1s;
  }

  .hud-value.bump {
    transform: scale(1.3);
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow), 0 0 20px var(--neon-yellow);
  }

  .game-container {
    position: relative;
    border: 1px solid rgba(0,255,136,0.3);
    box-shadow: 
      0 0 0 1px rgba(0,255,136,0.1),
      0 0 30px rgba(0,255,136,0.15),
      inset 0 0 30px rgba(0,0,0,0.5);
    background: var(--grid);
  }

  .game-container::before,
  .game-container::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-color: var(--neon-cyan);
    border-style: solid;
    z-index: 2;
  }
  .game-container::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; box-shadow: var(--glow-cyan); }
  .game-container::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; box-shadow: var(--glow-cyan); }

  canvas {
    display: block;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(2,4,8,0.88);
    z-index: 10;
    gap: 16px;
    backdrop-filter: blur(2px);
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 900;
    color: var(--neon-pink);
    text-shadow: var(--glow-pink);
    letter-spacing: 0.15em;
    animation: pulse 1s infinite alternate;
  }

  .overlay-score {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 0.1em;
  }

  .overlay-msg {
    font-size: 0.75rem;
    color: rgba(0,255,136,0.6);
    letter-spacing: 0.3em;
  }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 12px 32px;
    background: transparent;
    border: 1px solid var(--neon-green);
    color: var(--neon-green);
    cursor: pointer;
    text-shadow: var(--glow-green);
    box-shadow: var(--glow-green);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--neon-green);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
    z-index: -1;
  }

  .btn:hover::before { transform: scaleX(1); }
  .btn:hover { color: var(--bg); text-shadow: none; }

  .controls-hint {
    display: flex;
    gap: 24px;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: rgba(0,255,136,0.4);
  }

  .key {
    border: 1px solid rgba(0,255,136,0.3);
    padding: 2px 6px;
    color: rgba(0,255,136,0.6);
  }

  @keyframes flicker {
    0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
    20%,24%,55% { opacity: 0.7; }
  }

  @keyframes pulse {
    from { opacity: 1; }
    to { opacity: 0.6; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>SNAKE //</h1>
    <div class="subtitle">ARCADE EDITION · v2.0</div>
  </header>

  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="score">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">LEVEL</div>
      <div class="hud-value" id="level">1</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">BEST</div>
      <div class="hud-value" id="best">0</div>
    </div>
  </div>

  <div class="game-container">
    <canvas id="canvas"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlay-title">SNAKE //</div>
      <div class="overlay-score" id="overlay-score"></div>
      <div class="overlay-msg">USE ARROW KEYS OR WASD</div>
      <button class="btn" id="start-btn">▶ START GAME</button>
    </div>
  </div>

  <div class="controls-hint">
    <span><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> or <span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> to move</span>
    <span><span class="key">P</span> pause</span>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayScore = document.getElementById('overlay-score');
const startBtn = document.getElementById('start-btn');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const bestEl = document.getElementById('best');

const COLS = 25, ROWS = 25, CELL = 20;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

let snake, dir, nextDir, food, score, level, best, gameLoop, particles, running, paused;

best = parseInt(localStorage.getItem('snake_best') || '0');
bestEl.textContent = best;

function init() {
  snake = [
    {x:12,y:12},{x:11,y:12},{x:10,y:12}
  ];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  level = 1;
  particles = [];
  running = true;
  paused = false;
  scoreEl.textContent = 0;
  levelEl.textContent = 1;
  placeFood();
  overlay.classList.add('hidden');
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, getSpeed());
  requestAnimationFrame(draw);
}

function getSpeed() {
  return Math.max(60, 150 - (level - 1) * 15);
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function tick() {
  if (!running || paused) return;
  dir = nextDir;

  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  // Self collision
  if (snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    scoreEl.textContent = score;
    // bump animation
    scoreEl.classList.add('bump');
    setTimeout(()=>scoreEl.classList.remove('bump'),200);
    // level up every 5 foods
    if (score % (50 * level) === 0) {
      level++;
      levelEl.textContent = level;
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, getSpeed());
    }
    if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snake_best', best); }
    spawnParticles(food.x * CELL + CELL/2, food.y * CELL + CELL/2, '#ff0066');
    placeFood();
  } else {
    snake.pop();
  }
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.3;
    const speed = 1.5 + Math.random() * 2.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color,
      size: 2 + Math.random() * 3
    });
  }
}

function gameOver() {
  running = false;
  clearInterval(gameLoop);
  spawnParticles(snake[0].x * CELL + CELL/2, snake[0].y * CELL + CELL/2, '#00ff88');
  setTimeout(() => {
    overlayTitle.textContent = 'GAME OVER';
    overlayTitle.style.color = 'var(--neon-pink)';
    overlayTitle.style.textShadow = 'var(--glow-pink)';
    overlayScore.textContent = `SCORE: ${score}  |  BEST: ${best}`;
    startBtn.textContent = '↺ PLAY AGAIN';
    overlay.classList.remove('hidden');
  }, 600);
}

function draw() {
  // Background
  ctx.fillStyle = '#020408';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 0.5;
  for (let x=0;x<COLS;x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
  for (let y=0;y<ROWS;y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.9; p.vy *= 0.9;
    p.life -= 0.04;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Food
  const fx = food.x * CELL, fy = food.y * CELL;
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
  ctx.shadowBlur = 20 * pulse;
  ctx.shadowColor = '#ff0066';
  ctx.fillStyle = '#ff0066';
  const padding = 3;
  ctx.fillRect(fx + padding, fy + padding, CELL - padding*2, CELL - padding*2);
  // inner bright
  ctx.fillStyle = '#ff88aa';
  ctx.fillRect(fx + padding + 3, fy + padding + 3, 4, 4);
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const isHead = i === 0;
    const t = i / snake.length;
    const green = Math.floor(255 - t * 100);
    const color = isHead ? '#00ff88' : `rgb(0,${green},${Math.floor(green * 0.4)})`;

    ctx.shadowBlur = isHead ? 18 : 8;
    ctx.shadowColor = '#00ff88';
    ctx.fillStyle = color;

    const p = 1;
    ctx.fillRect(seg.x * CELL + p, seg.y * CELL + p, CELL - p*2, CELL - p*2);

    if (isHead) {
      // Eyes
      ctx.fillStyle = '#020408';
      ctx.shadowBlur = 0;
      const ex = dir.x === 1 ? 13 : dir.x === -1 ? 4 : 5;
      const ey = dir.y === 1 ? 13 : dir.y === -1 ? 4 : 5;
      ctx.fillRect(seg.x*CELL + ex, seg.y*CELL + ey, 3, 3);
      ctx.fillRect(seg.x*CELL + ex + (dir.y !== 0 ? 6 : 0), seg.y*CELL + ey + (dir.x !== 0 ? 6 : 0), 3, 3);
    }
  });
  ctx.shadowBlur = 0;

  // Scanlines overlay effect
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y=0; y<canvas.height; y+=4) ctx.fillRect(0,y,canvas.width,2);

  requestAnimationFrame(draw);
}

document.addEventListener('keydown', e => {
  const keys = {
    ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
    w:'up', s:'down', a:'left', d:'right',
    W:'up', S:'down', A:'left', D:'right'
  };
  const move = keys[e.key];
  if (move) {
    e.preventDefault();
    if (move==='up'    && dir.y===0) nextDir={x:0,y:-1};
    if (move==='down'  && dir.y===0) nextDir={x:0,y:1};
    if (move==='left'  && dir.x===0) nextDir={x:-1,y:0};
    if (move==='right' && dir.x===0) nextDir={x:1,y:0};
  }
  if (e.key==='p'||e.key==='P') {
    paused = !paused;
  }
});

startBtn.addEventListener('click', () => {
  overlayTitle.style.color = 'var(--neon-pink)';
  overlayTitle.style.textShadow = 'var(--glow-pink)';
  init();
});

// Initial draw
draw();
</script>
</body>
</html>
